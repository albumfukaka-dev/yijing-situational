<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易经·情境识别 总览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a18; display: flex; flex-direction: column; align-items: center; gap: 48px; padding: 48px 20px; min-height: 100vh; }
.page-label { font-family: "PingFang SC", sans-serif; font-size: 10px; color: #444; letter-spacing: 2px; text-align: center; margin-bottom: 6px; }
.card { width: 540px; height: 720px; background: #0a0a09; position: relative; overflow: hidden; flex-shrink: 0; border: 0.5px solid #222; }
.card::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.005) 3px, rgba(255,255,255,0.005) 4px); pointer-events: none; z-index: 1; }
.inner { position: relative; z-index: 2; width: 100%; height: 100%; padding: 24px 22px 18px; display: flex; flex-direction: column; }
.song { font-family: "Songti SC", "Noto Serif CJK SC", "SimSun", serif; }
.ping { font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }

.header { text-align: center; flex-shrink: 0; }
.header-title { font-size: 16px; color: #e8e0d4; letter-spacing: 5px; }
.header-sub { font-size: 10px; color: #555; letter-spacing: 2px; margin-top: 2px; }
.header-label { font-size: 11px; color: #9e9588; letter-spacing: 3px; margin-top: 5px; }
.header-line { width: 32px; height: 0.5px; background: #2a2a28; margin: 6px auto 0; }

.intro { font-size: 10px; color: #666; letter-spacing: 0.5px; line-height: 1.5; text-align: center; margin: 5px 0 6px; flex-shrink: 0; }

.tribes { flex: 1; display: flex; flex-direction: column; }
.tribe-row { display: flex; flex: 1; border-top: 0.5px solid #1e1e1c; }
.tribe-row:first-child { border-top: 0.5px solid #222; }
.tribe-row:nth-child(odd) { background: rgba(255,255,255,0.008); }

.tribe-left { width: 96px; flex-shrink: 0; padding: 0 8px 0 2px; display: flex; flex-direction: column; justify-content: center; border-right: 0.5px solid #1e1e1c; }
.tribe-num { font-size: 9px; color: #444; letter-spacing: 1px; }
.tribe-name { font-size: 17px; color: #e8e0d4; letter-spacing: 5px; margin: 2px 0; }
.tribe-q { font-size: 10px; color: #d4cabb; letter-spacing: 1px; }

.tribe-right { flex: 1; display: flex; flex-wrap: wrap; padding: 0 0 0 6px; align-content: center; }
.gua-block { width: 12.5%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2px 0; }
.gua-svg { display: block; }
.gua-label { text-align: center; margin-top: 2px; line-height: 1; }
.gua-full { font-size: 8px; color: #555; letter-spacing: 0.3px; }
.gua-name { font-size: 9px; color: #777; letter-spacing: 0.3px; }

.footer { display: flex; justify-content: space-between; align-items: flex-end; flex-shrink: 0; margin-top: 4px; padding-top: 4px; }
.brand { font-size: 9px; color: #333; letter-spacing: 2px; }
.series-tag { font-size: 8px; color: #2a2a28; letter-spacing: 2px; }
</style>
</head>
<body>

<!-- CARD 1 -->
<div class="page-label ping">CARD 1 · 上：我与局势</div>
<div class="card"><div class="inner">
  <div class="header">
    <div class="song header-title">易经 · 情境识别</div>
    <div class="ping header-sub">64卦 × 8种处境</div>
    <div class="ping header-label">上 · 我与局势</div>
    <div class="header-line"></div>
  </div>
  <div class="ping intro">外部环境给你什么牌——积累、乘势、突围、重建。</div>
  <div class="tribes" id="t1"></div>
  <div class="footer">
    <span class="ping brand">@野野野在游戏人间</span>
    <span class="ping series-tag">易经 · 情境识别</span>
  </div>
</div></div>

<!-- CARD 2 -->
<div class="page-label ping">CARD 2 · 下：我与关系 / 我与自己</div>
<div class="card"><div class="inner">
  <div class="header">
    <div class="song header-title">易经 · 情境识别</div>
    <div class="ping header-sub">64卦 × 8种处境</div>
    <div class="ping header-label">下 · 我与关系 / 我与自己</div>
    <div class="header-line"></div>
  </div>
  <div class="ping intro">你怎么回应——协作、守住、跨越、归零。</div>
  <div class="tribes" id="t2"></div>
  <div class="footer">
    <span class="ping brand">@野野野在游戏人间</span>
    <span class="ping series-tag">易经 · 情境识别</span>
  </div>
</div></div>

<script>
function triColor(a,b,c) {
  return ['111','101','001','100'].includes(`${a}${b}${c}`) ? '#c9a96e' : '#6a8a9a';
}
function drawGua(yao) {
  const w=30, h=24, gap=3.5, lw=1.2;
  const cUp=triColor(yao[0],yao[1],yao[2]), cLo=triColor(yao[3],yao[4],yao[5]);
  let s=`<svg class="gua-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
  for(let i=0;i<6;i++){const y=1.5+i*gap,c=i<3?cUp:cLo;
    if(yao[i]===1){s+=`<line x1="2" y1="${y}" x2="${w-2}" y2="${y}" stroke="${c}" stroke-width="${lw}" stroke-linecap="round"/>`}
    else{const m=w/2;s+=`<line x1="2" y1="${y}" x2="${m-2.8}" y2="${y}" stroke="${c}" stroke-width="${lw}" stroke-linecap="round"/>`;
    s+=`<line x1="${m+2.8}" y1="${y}" x2="${w-2}" y2="${y}" stroke="${c}" stroke-width="${lw}" stroke-linecap="round"/>`}}
  s+='</svg>';return s;
}

const d1=[
  {num:'①',name:'蓄积',q:'怎么积累？',guas:[
    {f:'水雷',n:'屯·03',y:[0,1,0,0,0,1]},{f:'山水',n:'蒙·04',y:[1,0,0,0,1,0]},{f:'水天',n:'需·05',y:[0,1,0,1,1,1]},{f:'水地',n:'比·08',y:[0,1,0,0,0,0]},
    {f:'风天',n:'小畜·09',y:[1,1,0,1,1,1]},{f:'天泽',n:'履·10',y:[1,1,1,0,1,1]},{f:'山天',n:'大畜·26',y:[1,0,0,1,1,1]},{f:'泽地',n:'萃·45',y:[0,1,1,0,0,0]}
  ]},
  {num:'②',name:'扩张',q:'怎么乘势？',guas:[
    {f:'乾为天',n:'乾·01',y:[1,1,1,1,1,1]},{f:'地天',n:'泰·11',y:[0,0,0,1,1,1]},{f:'火天',n:'大有·14',y:[1,0,1,1,1,1]},{f:'地泽',n:'临·19',y:[0,0,0,0,1,1]},
    {f:'雷天',n:'大壮·34',y:[0,0,1,1,1,1]},{f:'火地',n:'晋·35',y:[1,0,1,0,0,0]},{f:'泽天',n:'夬·43',y:[0,1,1,1,1,1]},{f:'地风',n:'升·46',y:[0,0,0,1,1,0]}
  ]},
  {num:'③',name:'受阻',q:'怎么突破？',guas:[
    {f:'天水',n:'讼·06',y:[1,1,1,0,1,0]},{f:'天地',n:'否·12',y:[1,1,1,0,0,0]},{f:'坎为水',n:'坎·29',y:[0,1,0,0,1,0]},{f:'地火',n:'明夷·36',y:[0,0,0,1,0,1]},
    {f:'水山',n:'蹇·39',y:[0,1,0,1,0,0]},{f:'雷水',n:'解·40',y:[0,0,1,0,1,0]},{f:'泽水',n:'困·47',y:[0,1,1,0,1,0]},{f:'震为雷',n:'震·51',y:[0,0,1,0,0,1]}
  ]},
  {num:'④',name:'重构',q:'怎么重建？',guas:[
    {f:'山风',n:'蛊·18',y:[1,0,0,1,1,0]},{f:'火雷',n:'噬嗑·21',y:[1,0,1,0,0,1]},{f:'泽风',n:'大过·28',y:[0,1,1,1,1,0]},{f:'山泽',n:'损·41',y:[1,0,0,0,1,1]},
    {f:'水风',n:'井·48',y:[0,1,0,1,1,0]},{f:'泽火',n:'革·49',y:[0,1,1,1,0,1]},{f:'火风',n:'鼎·50',y:[1,0,1,1,1,0]},{f:'风水',n:'涣·59',y:[1,1,0,0,1,0]}
  ]},
];

const d2=[
  {num:'⑤',name:'连接',q:'怎么协作？',guas:[
    {f:'地水',n:'师·07',y:[0,0,0,0,1,0]},{f:'天火',n:'同人·13',y:[1,1,1,1,0,1]},{f:'泽雷',n:'随·17',y:[0,1,1,0,0,1]},{f:'泽山',n:'咸·31',y:[0,1,1,1,0,0]},
    {f:'风火',n:'家人·37',y:[1,1,0,1,0,1]},{f:'火泽',n:'睽·38',y:[1,0,1,0,1,1]},{f:'雷泽',n:'归妹·54',y:[0,0,1,0,1,1]},{f:'兑为泽',n:'兑·58',y:[0,1,1,0,1,1]}
  ]},
  {num:'⑥',name:'收敛',q:'怎么守住？',guas:[
    {f:'坤为地',n:'坤·02',y:[0,0,0,0,0,0]},{f:'地山',n:'谦·15',y:[0,0,0,1,0,0]},{f:'雷地',n:'豫·16',y:[0,0,1,0,0,0]},{f:'山地',n:'剥·23',y:[1,0,0,0,0,0]},
    {f:'天山',n:'遁·33',y:[1,1,1,1,0,0]},{f:'天风',n:'姤·44',y:[1,1,1,1,1,0]},{f:'艮为山',n:'艮·52',y:[1,0,0,1,0,0]},{f:'火山',n:'旅·56',y:[1,0,1,1,0,0]}
  ]},
  {num:'⑦',name:'转折',q:'怎么跨越？',guas:[
    {f:'天雷',n:'无妄·25',y:[1,1,1,0,0,1]},{f:'雷风',n:'恒·32',y:[0,0,1,1,1,0]},{f:'风雷',n:'益·42',y:[1,1,0,0,0,1]},{f:'风山',n:'渐·53',y:[1,1,0,1,0,0]},
    {f:'雷火',n:'丰·55',y:[0,0,1,1,0,1]},{f:'雷山',n:'小过·62',y:[0,0,1,1,0,0]},{f:'水火',n:'既济·63',y:[0,1,0,1,0,1]},{f:'火水',n:'未济·64',y:[1,0,1,0,1,0]}
  ]},
  {num:'⑧',name:'校准',q:'怎么归零？',guas:[
    {f:'风地',n:'观·20',y:[1,1,0,0,0,0]},{f:'山火',n:'贲·22',y:[1,0,0,1,0,1]},{f:'地雷',n:'复·24',y:[0,0,0,0,0,1]},{f:'山雷',n:'颐·27',y:[1,0,0,0,0,1]},
    {f:'离为火',n:'离·30',y:[1,0,1,1,0,1]},{f:'巽为风',n:'巽·57',y:[1,1,0,1,1,0]},{f:'水泽',n:'节·60',y:[0,1,0,0,1,1]},{f:'风泽',n:'中孚·61',y:[1,1,0,0,1,1]}
  ]},
];

function render(data,id){
  const c=document.getElementById(id);
  data.forEach(t=>{
    const r=document.createElement('div');r.className='tribe-row';
    let gh='';
    t.guas.forEach(g=>{
      gh+=`<div class="gua-block">${drawGua(g.y)}<div class="gua-label"><span class="ping gua-full">${g.f}</span><br><span class="ping gua-name">${g.n}</span></div></div>`;
    });
    r.innerHTML=`<div class="tribe-left"><span class="ping tribe-num">${t.num}</span><span class="song tribe-name">${t.name}</span><span class="ping tribe-q">${t.q}</span></div><div class="tribe-right">${gh}</div>`;
    c.appendChild(r);
  });
}
render(d1,'t1');render(d2,'t2');
</script>
</body>
</html>
